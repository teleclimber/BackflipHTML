<b-unwrap b-name="labeled">
    <b-unwrap b-part="components.html#label" b-data:text="msg"></b-unwrap>
</b-unwrap>

<b-unwrap b-name="boxed">
    <div b-part="components.html#box">
        <span>Hi</span>
    </div>
</b-unwrap>

<b-unwrap b-name="full-page" b-export>
    <b-unwrap b-part="layout.html#shell" b-data:title="title">
        <p b-in="content">{{ body }}</p>
    </b-unwrap>
</b-unwrap>
